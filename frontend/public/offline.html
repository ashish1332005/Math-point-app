<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maths Point Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(201, 162, 39, 0.18), transparent 34%),
          linear-gradient(180deg, #050505 0%, #111111 100%);
        color: #f7ecd0;
      }

      .card {
        width: min(420px, 100%);
        padding: 28px;
        border: 1px solid rgba(201, 162, 39, 0.28);
        border-radius: 24px;
        background: rgba(17, 17, 17, 0.92);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.7rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #d5c9a7;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You're offline</h1>
      <p>Maths Point will reconnect automatically when your internet connection is back.</p>
    </main>
  </body>
  </html>
